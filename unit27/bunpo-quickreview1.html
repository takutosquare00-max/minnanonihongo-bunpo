<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport"/>
<title>L27 1回目クイック復習テスト（10分・5問）</title>
<style>*{margin:0;padding:0;box-sizing:border-box}html{-webkit-text-size-adjust:100%;-webkit-tap-highlight-color:transparent}html{font-size:21px}body{font-family:'Hiragino Kaku Gothic ProN','Hiragino Sans','Noto Sans JP',Meiryo,sans-serif;background:#eef2f7;color:#1a202c;line-height:1.6;padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left)}
.container{width:100%;max-width:920px;margin:0 auto;padding:12px 14px 28px}
header{background:linear-gradient(135deg,#dd6b20 0%,#c05621 100%);color:#fff;padding:12px 16px;border-radius:14px;margin-bottom:14px;position:sticky;top:8px;z-index:100;box-shadow:0 4px 15px rgba(221,107,32,.4)}
.work-head-row{display:flex;align-items:center;gap:10px}
header h1{flex:1;min-width:0;font-size:1.02em;margin:0;font-weight:700;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.timer-group{display:flex;align-items:center;gap:6px;flex:0 0 auto}
.timer{font-size:1.15em;font-weight:bold;font-variant-numeric:tabular-nums}
.timer.warning{color:#ffd700;animation:pulse 1s infinite}
.timer.danger{color:#ff4757;animation:pulse .5s infinite}
.timer.paused{color:#cbd5e0;animation:none}
.pause-btn{background:rgba(255,255,255,.25);border:none;color:#fff;width:30px;height:30px;border-radius:50%;font-size:.9em;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s;padding:0;line-height:1;touch-action:manipulation;-webkit-user-select:none;user-select:none;flex:0 0 auto}
.pause-btn:hover{background:rgba(255,255,255,.4)}
.pause-btn:active{transform:scale(.95)}
.pause-btn:disabled{opacity:.4;cursor:not-allowed}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
.progress-bar{width:100%;height:4px;margin-top:9px;background:rgba(255,255,255,.3);border-radius:4px;overflow:hidden}
.progress-fill{height:100%;background:#fff;border-radius:4px;transition:width .3s}
.section{background:#fff;border-radius:14px;padding:16px 18px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.section-title{font-size:.95em;font-weight:bold;color:#dd6b20;border-left:3px solid #dd6b20;padding-left:10px;margin-bottom:10px}
.section-lead{font-size:.95em;font-weight:500;color:#4a5568;line-height:1.5;margin-bottom:12px}
.question{padding:12px 0;border-bottom:1px solid #edf1f5}
.question:last-child{border-bottom:none}
.q-num{display:inline-flex;align-items:center;justify-content:center;background:#dd6b20;color:#fff;width:1.6em;height:1.6em;border-radius:50%;font-size:1em;font-weight:bold;font-family:'Hiragino Kaku Gothic ProN','Hiragino Sans','Noto Sans JP',Meiryo,sans-serif;vertical-align:middle;margin-right:.3em;position:relative;top:-.06em}
.q-text{font-size:1.08em;margin-bottom:9px;font-weight:500;line-height:1.6em}
.options{display:grid;grid-template-columns:1fr 1fr;gap:6px;align-items:stretch}
.option{position:relative;display:flex;min-height:0}
.option input{display:none}
.option label{flex:1;display:flex;align-items:baseline;gap:6px;padding:9px 11px;border:1.5px solid #e2e8f0;border-radius:9px;cursor:pointer;transition:all .15s;font-size:.92em;touch-action:manipulation;-webkit-user-select:none;user-select:none;min-height:40px;width:100%;box-sizing:border-box;font-family:'Hiragino Kaku Gothic ProN','Hiragino Sans','Noto Sans JP',Meiryo,sans-serif}
.option .opt-key{flex:0 0 auto;min-width:1.5em;text-align:right;font-weight:600;line-height:1.3;align-self:center;color:#4a5568;font-family:inherit;position:relative;top:.16em}
.option .opt-body{flex:1;min-width:0;line-height:1.5;align-self:center;word-break:break-word;font-family:inherit}
.option .opt-body:not(:has(ruby)){position:relative;top:.16em}
.option label:hover{border-color:#dd6b20;background:#f0f7ff}
.option input:checked+label{border-color:#dd6b20;background:#e8f2fc;color:#1a365d;font-weight:600}
.option.correct label{border-color:#48bb78!important;background:#f0fff4!important;color:#276749!important}
.option.alt-correct label{border-color:#f6ad55!important;background:#fffbeb!important;color:#975a16!important}
.option.wrong label{border-color:#fc8181!important;background:#fff5f5!important;color:#9b2c2c!important}
.btn-submit{display:block;width:100%;min-height:44px;padding:13px;background:linear-gradient(135deg,#dd6b20 0%,#c05621 100%);color:#fff;border:none;border-radius:11px;font-size:1.02em;font-weight:bold;cursor:pointer;transition:transform .2s,box-shadow .2s;margin-top:4px;touch-action:manipulation;-webkit-user-select:none;user-select:none;box-shadow:0 4px 14px rgba(221,107,32,.4)}
.btn-submit:hover{transform:translateY(-1px)}
.btn-submit:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}
.result-panel{background:#fff;border-radius:14px;padding:24px 20px;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,.08);margin-top:14px;display:none}
.result-panel h2{font-size:1.4em;margin-bottom:6px}
.result-score{font-size:2.3em;font-weight:bold;margin:10px 0}
.result-score.excellent{color:#48bb78}
.result-score.good{color:#dd6b20}
.result-score.fair{color:#ed8936}
.result-score.poor{color:#fc8181}
.result-detail{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-top:14px}
.result-item{background:#f7fafc;padding:10px;border-radius:8px}
.result-item .label{font-size:.75em;color:#718096}
.result-item .value{font-size:1.05em;font-weight:bold}
.explanation{display:none;margin-top:7px;padding:9px 11px;background:#fffbeb;border-radius:8px;font-size:.85em;border-left:3px solid #f6ad55;line-height:1.5}
.explanation.show{display:block}
.dialogue{margin:5px 0 10px;padding:11px 13px;background:#f7fafc;border-left:3px solid #dd6b20;border-radius:0 8px 8px 0;font-size:.96em;line-height:1.75}
.dialogue p{margin:0 0 .4em;padding:0}
.dialogue p:last-child{margin-bottom:0}
.dialogue .sp{font-weight:700;color:#1a365d;margin-right:.2em}
ruby{ruby-align:center}
rt{font-size:.55em;font-weight:400;line-height:1.1}
.blank-paren{display:inline-block;color:#c05621;font-weight:700;white-space:nowrap}
</style>
</head>
<body>

<div class="container"><header class="work-head"><div class="work-head-row"><h1>L27 1回目クイック復習テスト（10分・5問）</h1><div class="timer-group"><div class="timer" id="timer">10:00</div><button aria-label="一時停止" class="pause-btn" id="pauseBtn" onclick="togglePause()" type="button">⏸</button></div></div><div class="progress-bar"><div class="progress-fill" id="progress" style="width:100%"></div></div></header>

<div class="section">
<div class="section-title"><ruby>復習<rt>ふくしゅう</rt></ruby>：<ruby>可能動詞<rt>かのうどうし</rt></ruby>・<ruby>見<rt>み</rt></ruby>えます/<ruby>聞<rt>き</rt></ruby>こえます・できます</div>
<p class="section-lead">（　）に<ruby>入<rt>はい</rt></ruby>る<ruby>正<rt>ただ</rt></ruby>しいものはどれですか。</p>

<div class="question">
<div class="q-text"><span class="q-num">1</span>わたしは コーヒーが<span class="blank-paren">（　　　）</span>。</div>
<div class="options">
<div class="option"><input id="q1a" name="q1" type="radio" value="1"/><label for="q1a"><span class="opt-key">1.</span><span class="opt-body"><ruby>飲<rt>の</rt></ruby>めます</span></label></div>
<div class="option"><input id="q1b" name="q1" type="radio" value="0"/><label for="q1b"><span class="opt-key">2.</span><span class="opt-body"><ruby>飲<rt>の</rt></ruby>みられます</span></label></div>
<div class="option"><input id="q1c" name="q1" type="radio" value="0"/><label for="q1c"><span class="opt-key">3.</span><span class="opt-body"><ruby>飲<rt>の</rt></ruby>まれます</span></label></div>
<div class="option"><input id="q1d" name="q1" type="radio" value="0"/><label for="q1d"><span class="opt-key">4.</span><span class="opt-body"><ruby>飲<rt>の</rt></ruby>められます</span></label></div>
</div>
<div class="explanation">✅ 正解：1 — 飲みます→飲めます。</div>
</div>

<div class="question">
<div class="q-text"><span class="q-num">2</span>あした、わたしは<span class="blank-paren">（　　　）</span>。</div>
<div class="options">
<div class="option"><input id="q2a" name="q2" type="radio" value="1"/><label for="q2a"><span class="opt-key">1.</span><span class="opt-body"><ruby>来<rt>こ</rt></ruby>られます</span></label></div>
<div class="option"><input id="q2b" name="q2" type="radio" value="0"/><label for="q2b"><span class="opt-key">2.</span><span class="opt-body"><ruby>来<rt>こ</rt></ruby>れます</span></label></div>
<div class="option"><input id="q2c" name="q2" type="radio" value="0"/><label for="q2c"><span class="opt-key">3.</span><span class="opt-body"><ruby>来<rt>こ</rt></ruby>させます</span></label></div>
<div class="option"><input id="q2d" name="q2" type="radio" value="0"/><label for="q2d"><span class="opt-key">4.</span><span class="opt-body"><ruby>来<rt>き</rt></ruby>ます</span></label></div>
</div>
<div class="explanation">✅ 正解：1 — 来ます→来られます。</div>
</div>

<div class="question">
<div class="q-text"><span class="q-num">3</span><ruby>漢字<rt>かんじ</rt></ruby><span class="blank-paren">（　　　）</span><ruby>読<rt>よ</rt></ruby>めますか。</div>
<div class="options">
<div class="option"><input id="q3a" name="q3" type="radio" value="1"/><label for="q3a"><span class="opt-key">1.</span><span class="opt-body">が</span></label></div>
<div class="option"><input id="q3b" name="q3" type="radio" value="0"/><label for="q3b"><span class="opt-key">2.</span><span class="opt-body">を</span></label></div>
<div class="option"><input id="q3c" name="q3" type="radio" value="0"/><label for="q3c"><span class="opt-key">3.</span><span class="opt-body">は</span></label></div>
<div class="option"><input id="q3d" name="q3" type="radio" value="0"/><label for="q3d"><span class="opt-key">4.</span><span class="opt-body">で</span></label></div>
</div>
<div class="explanation">✅ 正解：1 — 可能動詞の目的語は「が」。</div>
</div>

<div class="question">
<div class="q-text"><span class="q-num">4</span>ここから <ruby>山<rt>やま</rt></ruby>が<span class="blank-paren">（　　　）</span>。</div>
<div class="options">
<div class="option"><input id="q4a" name="q4" type="radio" value="1"/><label for="q4a"><span class="opt-key">1.</span><span class="opt-body"><ruby>見<rt>み</rt></ruby>えます</span></label></div>
<div class="option"><input id="q4b" name="q4" type="radio" value="0"/><label for="q4b"><span class="opt-key">2.</span><span class="opt-body"><ruby>見<rt>み</rt></ruby>られます</span></label></div>
<div class="option"><input id="q4c" name="q4" type="radio" value="0"/><label for="q4c"><span class="opt-key">3.</span><span class="opt-body"><ruby>見<rt>み</rt></ruby>ます</span></label></div>
<div class="option"><input id="q4d" name="q4" type="radio" value="0"/><label for="q4d"><span class="opt-key">4.</span><span class="opt-body"><ruby>見<rt>み</rt></ruby>えられます</span></label></div>
</div>
<div class="explanation">✅ 正解：1 — 自然に目に入るときは「見えます」。</div>
</div>

<div class="question">
<div class="q-text"><span class="q-num">5</span>（　）に<ruby>入<rt>はい</rt></ruby>る<ruby>正<rt>ただ</rt></ruby>しいものはどれですか。</div>
<div class="options" style="grid-template-columns:1fr">
<div class="option"><input id="q5a" name="q5" type="radio" value="1"/><label for="q5a"><span class="opt-key">1.</span><span class="opt-body"><ruby>完成<rt>かんせい</rt></ruby>した・<ruby>新<rt>あたら</rt></ruby>しくできた</span></label></div>
<div class="option"><input id="q5b" name="q5" type="radio" value="0"/><label for="q5b"><span class="opt-key">2.</span><span class="opt-body"><ruby>上手<rt>じょうず</rt></ruby>になった</span></label></div>
<div class="option"><input id="q5c" name="q5" type="radio" value="0"/><label for="q5c"><span class="opt-key">3.</span><span class="opt-body">できる（可能）</span></label></div>
<div class="option"><input id="q5d" name="q5" type="radio" value="0"/><label for="q5d"><span class="opt-key">4.</span><span class="opt-body"><ruby>終<rt>お</rt></ruby>わった</span></label></div>
</div>
<div class="explanation">✅ 正解：1 — 完成・成立の意味です。</div>
</div>
</div>

<button class="btn-submit" id="submitBtn" onclick="submitTest()"><ruby>採点<rt>さいてん</rt></ruby>する</button>
<div class="result-panel" id="resultPanel"><h2 id="resultTitle"></h2><div class="result-score" id="resultScore"></div><div class="result-detail" id="resultDetail"></div></div>
</div>
<script>const TOTAL=5,TIME_LIMIT=600;let timeLeft=TIME_LIMIT,timerInterval,submitted=false,paused=false;
function togglePause(){if(submitted)return;paused=!paused;const b=document.getElementById('pauseBtn'),t=document.getElementById('timer');b.textContent=paused?'▶':'⏸';b.setAttribute('aria-label',paused?'再開':'一時停止');if(paused){t.classList.add('paused');t.classList.remove('warning','danger')}else{t.classList.remove('paused');if(timeLeft<=60)t.classList.add('danger');else if(timeLeft<=300)t.classList.add('warning')}}
function shuffleAllOptions(){function r(n){if(n<=1)return 0;try{if(crypto&&crypto.getRandomValues){const lim=Math.floor(4294967296/n)*n,b=new Uint32Array(1);let x;do{crypto.getRandomValues(b);x=b[0]}while(x>=lim);return x%n}}catch(e){}return Math.floor(Math.random()*n)}function fy(a){for(let i=a.length-1;i>0;i--){const j=r(i+1),t=a[i];a[i]=a[j];a[j]=t}}function upd(o,e){const ks=Array.from(o.querySelectorAll('input[value="1"],input[value="2"]')).map(inp=>{const k=inp.closest('.option').querySelector('.opt-key'),m=k&&k.textContent.match(/^(\d+)\./);return m?m[1]:''}).filter(Boolean).sort((a,b)=>Number(a)-Number(b));if(ks.length)e.innerHTML=e.innerHTML.replace(/正解：[0-9・]+/,'正解：'+ks.join('・'))}function rel(o,it,p){it.forEach(el=>o.appendChild(el));it.forEach((el,i)=>{const inp=el.querySelector('input'),lab=el.querySelector('label'),id=p+String.fromCharCode(97+i);inp.id=id;lab.setAttribute('for',id);el.querySelector('.opt-key').textContent=(i+1)+'.'});const e=o.nextElementSibling;if(e&&e.classList.contains('explanation'))upd(o,e);return it.findIndex(el=>el.querySelector('input[value="1"]'))}const cnt=[0,0,0,0];document.querySelectorAll('.options').forEach(o=>{const it=Array.from(o.children).filter(el=>el.classList.contains('option'));if(it.length<2)return;fy(it);const p=o.querySelector('input').name;let s=rel(o,it,p);let min=Math.min(...cnt.slice(0,it.length)),c=[];for(let i=0;i<it.length;i++)if(cnt[i]===min)c.push(i);const ideal=c[r(c.length)];if(s!==ideal&&cnt[s]>cnt[ideal]){const t=it[s];it[s]=it[ideal];it[ideal]=t;s=rel(o,it,p)}cnt[s]++})}
function visibleLen(el){const c=el.cloneNode(true);c.querySelectorAll('rt,rp').forEach(n=>n.remove());return c.textContent.trim().length}
function layoutOptions(){document.querySelectorAll('.options').forEach(o=>{const bodies=o.querySelectorAll('.opt-body');if(!bodies.length)return;const maxLen=Math.max(...Array.from(bodies).map(visibleLen));o.style.gridTemplateColumns=maxLen<=15?'1fr 1fr':'1fr'})}
try{layoutOptions()}catch(e){}
try{shuffleAllOptions()}catch(e){}
function startTimer(){timerInterval=setInterval(()=>{if(paused)return;timeLeft--;const m=Math.floor(timeLeft/60),s=timeLeft%60,t=document.getElementById('timer');t.textContent=`${m}:${s.toString().padStart(2,'0')}`;document.getElementById('progress').style.width=(timeLeft/TIME_LIMIT*100)+'%';if(timeLeft<=60){t.className='timer danger'}else if(timeLeft<=300){t.className='timer warning'}else{t.className='timer'}if(timeLeft<=0){clearInterval(timerInterval);submitTest()}},1000)}
function submitTest(){if(submitted)return;submitted=true;clearInterval(timerInterval);let score=0;for(let i=1;i<=TOTAL;i++){const opts=Array.from(document.querySelectorAll(`input[name="q${i}"]`)),sel=opts.find(o=>o.checked);if(sel&&(sel.value==='1'||sel.value==='2'))score++;opts.forEach(o=>{const w=o.closest('.option');if(o.value==='1')w.classList.add('correct');else if(o.value==='2')w.classList.add('alt-correct');else if(o.checked)w.classList.add('wrong')});const exp=opts[0].closest('.question').querySelector('.explanation');if(exp)exp.classList.add('show')}const pct=Math.round(score/TOTAL*100),p=document.getElementById('resultPanel'),sc=document.getElementById('resultScore'),tt=document.getElementById('resultTitle');p.style.display='block';sc.textContent=`${score} / ${TOTAL}（${pct}%）`;sc.className='result-score '+(pct>=90?'excellent':pct>=70?'good':pct>=50?'fair':'poor');tt.textContent=pct>=90?'すばらしい！':pct>=70?'よくできました！':pct>=50?'もうすこし！':'がんばりましょう！';const used=TIME_LIMIT-timeLeft;document.getElementById('resultDetail').innerHTML=`<div class="result-item"><div class="label">せいかい</div><div class="value">${score}/${TOTAL}</div></div><div class="result-item"><div class="label">じかん</div><div class="value">${Math.floor(used/60)}分${used%60}秒</div></div>`;document.getElementById('submitBtn').disabled=true;document.getElementById('pauseBtn').disabled=true;p.scrollIntoView({behavior:'smooth'})}
startTimer();</script>
</body>
</html>
